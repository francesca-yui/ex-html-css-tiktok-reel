<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
     <div class="video">
      <i class="bi bi-play-btn"></i>
     </div>
     <div class="menu">
      <span class="explore menu-item">Esplora</span>
      <span class="follow menu-item">Seguiti
        <div class="follow-dot"></div>
      </span>
      <span class="for-you menu-item active">Per te</span>
     </div>
     <div class="lens">
      <i class="bi bi-search"></i>
    </div>
     
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <figure class="boolean-icon">
        <img src="assets/img/boolean_logo.png" alt="boolean-icon">
      </figure> 

      <div class="plus">
        <i class="bi bi-plus"></i>
      </div>

      <section class="icons-sidebar">
        <div class="heart">
          <i class="bi bi-heart-fill"></i>
          <span class="value">588</span>
        </div>
        <div class="comments">
          <i class="bi bi-chat-dots-fill"></i>
          <span class="value">13</span>
        </div>
        <div class="saved">
          <i class="bi bi-bookmark-fill"></i>
          <span class="value">638</span>
        </div>
        <div class="share">
          <i class="bi bi-sign-turn-slight-right-fill"></i>
          <span class="value">491</span>
        </div>
      </section>
    </div>

    <!-- Footer -->
    <footer>
    <section class="copy">
       <div class="profile-name"><b>boolean.careers</b></div>
        <div class="caption">Prova il Fundamenttals Camp. 20 ore di corso
        <br>
       gratuito per...
       <b>Vedi altro</b>
      </div>
    </section>

    <section class="footer-icon">
      <div class="home footer-item">
        <i class="bi bi-house-fill"></i>
        <span class="description">Home</span>
      </div>
      <div class="friends footer-item">
        <i class="bi bi-people"></i>
        <span class="description">Amici</span>
      </div>
      <div class="create">
        <img src="https://i.etsystatic.com/34485599/r/il/ac5579/5091800572/il_fullxfull.5091800572_necs.jpg" alt="">
      </div>
      <div class="chat footer-item">
        <i class="bi bi-chat-square"></i>
        <span class="description">Posta in arrivo</span>
        <span class="inbox">19</span>
      </div>
      <div class="profile footer-item">
        <i class="bi bi-person"></i>
        <span class="description">Profilo</span>
      </div>
    </section>  

    </footer>
  </div>

</body>

</html>
